name: Build CivilAI Desktop Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact: windows-installer
          - os: macos-14
            artifact: macos-arm64-installer
          - os: macos-13
            artifact: macos-intel-installer
          - os: ubuntu-22.04
            artifact: linux-installer

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./packaging/windows/build_windows.ps1

      - name: Build macOS installer
        if: runner.os == 'macOS'
        shell: bash
        run: bash packaging/macos/build_macos.sh

      - name: Build Linux installer
        if: runner.os == 'Linux'
        shell: bash
        run: bash packaging/linux/build_linux.sh

      - name: Upload installer bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            desktop/src-tauri/target/release/bundle/
          if-no-files-found: error
