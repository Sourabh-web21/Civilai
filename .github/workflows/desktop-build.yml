name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: civilai-windows
            sidecar-triple: x86_64-pc-windows-msvc
          - os: macos-latest
            artifact-name: civilai-macos
            sidecar-triple: ''
          - os: ubuntu-latest
            artifact-name: civilai-linux
            sidecar-triple: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install Python deps
        env:
          CMAKE_ARGS: ${{ runner.os == 'macOS' && '-DGGML_METAL=on' || '' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-local-ai.txt pyinstaller

      - name: Build backend
        run: pyinstaller packaging/pyinstaller/civilai-backend.spec --noconfirm

      - name: Prepare Tauri sidecar
        shell: pwsh
        run: ./packaging/prepare_tauri_sidecar.ps1 -TargetTriple "${{ matrix.sidecar-triple }}"

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^1.6' --locked

      - name: Build desktop
        working-directory: desktop/src-tauri
        run: cargo tauri build

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            desktop/src-tauri/target/release/bundle/**
            desktop/src-tauri/target/release/CivilAI*
          if-no-files-found: error
